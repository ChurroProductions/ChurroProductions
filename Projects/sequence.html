<style>
    /* Game Page Specific Styles */
    headerg1 {
        height: 100vh;
        background-color: black;
        display: flex;
        align-items: top;
        justify-content: center;
        position: relative;
        margin-top: 80px;
        width: 100%;
    }

    headerg1::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        top: 0;
        left: 0;
    }

    .headerg1-content {
        position: relative;
        z-index: 2;
        animation: fadeIn 2s ease-in-out;
    }

    headerg1 h1 {
        transform: translateX(-400px);
        font-size: 3em;
        color: rgb(255, 255, 255);
        margin: 30px;
        text-align: left;
    }

    headerg1 h3 {
            transform: translateX(-400px);
            font-size: 1em;
            color: rgb(255, 255, 255);
            margin: 30px;
            text-align: left;
   
        }

    headerg1 img {
        position: absolute;
        right: -400px;
        top: 25%;
        transform: translateY(-50%);
        width: 700px;
        height: auto;
    }

    headerg1 button {
        position: absolute;
        right: 460px;
        top: 42.5%;
        transform: translateY(-50%);
        padding: 15px 50px;
        font-size: 1em;
        background-color: #262626;
        color: white;
        border: none;
        cursor: pointer;
    }

    headerg1 button:hover {
        background-color: #3e3e3e;
    }  
</style>

<script>
    // Scroll animation
    const sections = document.querySelectorAll("section");

    window.addEventListener("scroll", () => {
        sections.forEach(section => {
            const rect = section.getBoundingClientRect();
            if (rect.top < window.innerHeight - 100) {
                section.classList.add("visible");
            }
        });
    });
</script>
