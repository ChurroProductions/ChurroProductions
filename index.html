<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churro Productions</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen">
        <img src="https://i.ibb.co/nsQ35WVZ/Churro-Prod-1.png" alt="Churro Productions Logo">
    </div>

    <div class="container">
        <h1><span class="churro">Churro</span> Productions</h1>
        <h2>Site is down... Check back later!</h2>
    </div>

    <div id="page-transition"></div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelector('.container').style.opacity = '1';

        document.querySelectorAll('.navbar a').forEach(link => {
            link.addEventListener('click', e => {
                const href = link.getAttribute('href');
                if (href && href !== '#' && window.location.href !== new URL(href, location).href) {
                    e.preventDefault();
                    document.getElementById('page-transition').style.opacity = '1';
                    setTimeout(() => location.href = href, 1000);
                }
            });
        });
    });
    </script>
</body>
</html>
